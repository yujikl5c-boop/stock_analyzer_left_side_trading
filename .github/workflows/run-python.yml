name: 自动运行我的 Python 脚本

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '27 6 * * 1-5'   # 北京时间交易日 14:27 运行（UTC 6:27）

jobs:
  run-python:
    runs-on: ubuntu-latest
    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 恢复持仓状态缓存
        id: cache-portfolio
        uses: actions/cache@v4
        with:
          path: left_portfolio.json
          key: left-portfolio-${{ github.ref_name }}

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install mootdx pandas numpy openpyxl

      - name: 运行 main.py
        run: python main.py

      - name: 上传生成的 HTML 看板
        uses: actions/upload-artifact@v4
        with:
          name: left-index
          path: left_index.html
